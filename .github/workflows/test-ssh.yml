name: Test SSH connection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-ssh:
    name: Test connection to LH.pl
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.LH_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.LH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 700 -d "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/lh_deploy_key"
          chmod 600 "$HOME/.ssh/lh_deploy_key"

          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Diagnose SSH and WordPress paths
        shell: bash
        env:
          SSH_HOST: ${{ secrets.LH_SSH_HOST }}
          SSH_PORT: ${{ secrets.LH_SSH_PORT }}
          SSH_USER: ${{ secrets.LH_SSH_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/lh_deploy_key" \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            'echo "SSH OK";
             echo "Uzytkownik: $(whoami)";
             echo "HOME: $HOME";
             echo "PWD: $(pwd)";
             echo "--- public_html ---";
             ls -la "$HOME/public_html";
             echo "--- twojmotylek.pl ---";
             ls -la "$HOME/public_html/twojmotylek.pl";
             if [ -d "$HOME/public_html/twojmotylek.pl/wp-content/themes/salient" ]; then
               echo "OK - katalog Salient istnieje";
             else
               echo "BLAD - katalog Salient nie istnieje pod oczekiwana sciezka";
               exit 1;
             fi'
